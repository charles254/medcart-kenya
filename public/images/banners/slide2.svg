<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <!-- Family with vitamins -->
  <circle cx="250" cy="350" r="190" fill="rgba(74,222,128,0.08)"/>

  <!-- Mother figure -->
  <circle cx="200" cy="105" r="38" fill="#8B6847"/><!-- head -->
  <path d="M165 90 Q170 55 200 50 Q230 55 235 90" fill="#1A0F05"/><!-- hair -->
  <ellipse cx="190" cy="103" rx="2.5" ry="3" fill="#1A0F05"/>
  <ellipse cx="210" cy="103" rx="2.5" ry="3" fill="#1A0F05"/>
  <path d="M193 116 Q200 121 207 116" stroke="#7A5A3A" stroke-width="1.5" fill="none"/>

  <rect x="170" y="143" width="60" height="110" rx="8" fill="#4ADE80"/><!-- dress -->
  <rect x="155" y="153" width="18" height="65" rx="8" fill="#8B6847"/><!-- arm L -->
  <rect x="227" y="153" width="18" height="65" rx="8" fill="#8B6847"/><!-- arm R -->

  <!-- Child figure -->
  <circle cx="310" cy="155" r="30" fill="#F4C7A3"/><!-- head -->
  <path d="M283 145 Q288 125 310 120 Q332 125 337 145" fill="#2D1B0E"/><!-- hair -->
  <ellipse cx="302" cy="153" rx="2" ry="2.5" fill="#2D1B0E"/>
  <ellipse cx="318" cy="153" rx="2" ry="2.5" fill="#2D1B0E"/>
  <path d="M305 164 Q310 168 315 164" stroke="#C4876E" stroke-width="1.5" fill="none"/>

  <rect x="285" y="185" width="50" height="80" rx="6" fill="#FF6B35"/><!-- shirt -->
  <rect x="273" y="193" width="14" height="50" rx="6" fill="#F4C7A3"/><!-- arm L -->
  <rect x="333" y="193" width="14" height="50" rx="6" fill="#F4C7A3"/><!-- arm R -->

  <!-- Vitamin bottles between them -->
  <rect x="230" y="180" width="35" height="60" rx="5" fill="white" opacity="0.9"/>
  <rect x="235" y="168" width="25" height="16" rx="3" fill="#E8F5E9"/>
  <rect x="235" y="168" width="25" height="7" rx="3" fill="#00A651" opacity="0.7"/>
  <text x="247" y="210" font-family="Arial" font-size="7" fill="#00A651" text-anchor="middle" font-weight="bold">VIT C</text>

  <rect x="155" y="220" width="30" height="50" rx="4" fill="white" opacity="0.8"/>
  <rect x="159" y="210" width="22" height="13" rx="3" fill="#FF6B35" opacity="0.8"/>
  <text x="170" y="248" font-family="Arial" font-size="6" fill="#FF6B35" text-anchor="middle" font-weight="bold">D3</text>

  <!-- Sparkles / health indicators -->
  <circle cx="350" cy="120" r="12" fill="rgba(255,255,255,0.15)"/>
  <text x="350" y="125" font-family="Arial" font-size="14" fill="white" text-anchor="middle" opacity="0.6">+</text>
  <circle cx="130" cy="160" r="10" fill="rgba(255,255,255,0.12)"/>
  <text x="130" y="165" font-family="Arial" font-size="12" fill="white" text-anchor="middle" opacity="0.5">+</text>

  <!-- Heart -->
  <path d="M380 200 Q380 185 395 185 Q410 185 410 200 Q410 215 395 230 Q380 215 380 200Z" fill="#FF6B35" opacity="0.4"/>

  <circle cx="420" cy="300" r="6" fill="white" opacity="0.15"/>
  <circle cx="100" cy="280" r="8" fill="white" opacity="0.1"/>
</svg>
