<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <rect width="1200" height="400" fill="url(#g3)"/>
  <defs><linearGradient id="g3" x1="0" y1="0" x2="1" y2="0.8"><stop offset="0%" stop-color="#FF6B35"/><stop offset="100%" stop-color="#CC4400"/></linearGradient></defs>
  <circle cx="950" cy="200" r="170" fill="rgba(255,255,255,0.08)"/>
  <circle cx="1000" cy="160" r="110" fill="rgba(255,255,255,0.05)"/>
  <!-- Sale tag -->
  <g transform="translate(900, 80)">
    <rect width="120" height="120" rx="60" fill="white" opacity="0.95"/>
    <text x="60" y="55" font-family="Arial" font-size="14" fill="#FF6B35" text-anchor="middle" font-weight="bold">UP TO</text>
    <text x="60" y="85" font-family="Arial" font-size="36" fill="#FF6B35" text-anchor="middle" font-weight="900">50%</text>
    <text x="60" y="105" font-family="Arial" font-size="14" fill="#FF6B35" text-anchor="middle" font-weight="bold">OFF</text>
  </g>
  <!-- Shopping bag -->
  <g transform="translate(1040, 180)">
    <rect x="0" y="20" width="80" height="70" rx="6" fill="white" opacity="0.85"/>
    <path d="M20 20 Q20 -5 40 -5 Q60 -5 60 20" stroke="#FF6B35" stroke-width="4" fill="none" stroke-linecap="round"/>
    <text x="40" y="65" font-family="Arial" font-size="28" fill="#FF6B35" text-anchor="middle" font-weight="bold">+</text>
  </g>
  <!-- Sparkles -->
  <circle cx="860" cy="250" r="4" fill="white" opacity="0.4"/>
  <circle cx="1130" cy="120" r="3" fill="white" opacity="0.3"/>
  <circle cx="1100" cy="310" r="5" fill="white" opacity="0.25"/>
  <circle cx="880" cy="320" r="3" fill="white" opacity="0.35"/>
</svg>
