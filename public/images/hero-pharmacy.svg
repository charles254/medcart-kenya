<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <!-- Background elements -->
  <circle cx="300" cy="250" r="200" fill="rgba(255,255,255,0.08)"/>
  <circle cx="300" cy="250" r="150" fill="rgba(255,255,255,0.06)"/>

  <!-- Medicine bottle -->
  <rect x="230" y="120" width="80" height="140" rx="8" fill="white" opacity="0.95"/>
  <rect x="240" y="100" width="60" height="30" rx="4" fill="#E8F5E9"/>
  <rect x="240" y="100" width="60" height="12" rx="4" fill="#00A651"/>
  <rect x="245" y="145" width="50" height="6" rx="3" fill="#00A651" opacity="0.7"/>
  <rect x="250" y="158" width="40" height="4" rx="2" fill="#CBD5E1"/>
  <rect x="250" y="168" width="40" height="4" rx="2" fill="#CBD5E1"/>
  <rect x="250" y="178" width="30" height="4" rx="2" fill="#CBD5E1"/>
  <text x="270" y="210" font-family="Arial" font-size="8" fill="#64748B" text-anchor="middle">500mg</text>
  <text x="270" y="230" font-family="Arial" font-size="7" fill="#94A3B8" text-anchor="middle">100 Tablets</text>

  <!-- Pill capsules scattered -->
  <g transform="translate(370, 160) rotate(25)">
    <rect width="44" height="18" rx="9" fill="#FF6B35"/>
    <rect width="22" height="18" rx="9" fill="#FFE0D0"/>
  </g>
  <g transform="translate(150, 200) rotate(-15)">
    <rect width="44" height="18" rx="9" fill="#00A651"/>
    <rect width="22" height="18" rx="9" fill="#E8F5E9"/>
  </g>
  <g transform="translate(380, 280) rotate(10)">
    <rect width="36" height="15" rx="7.5" fill="#1B3A5C"/>
    <rect width="18" height="15" rx="7.5" fill="#B8D4F0"/>
  </g>
  <g transform="translate(130, 310) rotate(-30)">
    <rect width="40" height="16" rx="8" fill="#FF6B35"/>
    <rect width="20" height="16" rx="8" fill="#FFDAC8"/>
  </g>

  <!-- Stethoscope -->
  <path d="M400 200 Q420 200 430 220 Q440 240 430 260 Q420 280 400 290" stroke="white" stroke-width="4" fill="none" opacity="0.5" stroke-linecap="round"/>
  <circle cx="400" cy="295" r="10" fill="white" opacity="0.5"/>
  <circle cx="400" cy="295" r="5" fill="rgba(255,255,255,0.3)"/>

  <!-- Heart rate line -->
  <polyline points="100,350 140,350 155,320 170,380 185,340 200,350 260,350 275,310 290,390 305,330 320,350 500,350" stroke="white" stroke-width="2.5" fill="none" opacity="0.25" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Shopping bag -->
  <g transform="translate(340, 320)">
    <rect x="0" y="15" width="60" height="55" rx="4" fill="white" opacity="0.9"/>
    <path d="M15 15 Q15 -5 30 -5 Q45 -5 45 15" stroke="#00A651" stroke-width="3" fill="none" stroke-linecap="round"/>
    <text x="30" y="50" font-family="Arial" font-size="20" fill="#00A651" text-anchor="middle" font-weight="bold">+</text>
  </g>

  <!-- Shield / trust badge -->
  <g transform="translate(140, 130)">
    <path d="M25 0 L50 10 L50 30 Q50 50 25 60 Q0 50 0 30 L0 10 Z" fill="white" opacity="0.15"/>
    <text x="25" y="38" font-family="Arial" font-size="18" fill="white" text-anchor="middle" opacity="0.4">&#10003;</text>
  </g>

  <!-- Floating circles decoration -->
  <circle cx="470" cy="140" r="8" fill="white" opacity="0.15"/>
  <circle cx="120" cy="380" r="12" fill="white" opacity="0.1"/>
  <circle cx="490" cy="350" r="6" fill="white" opacity="0.2"/>
  <circle cx="180" cy="140" r="5" fill="white" opacity="0.15"/>
  <circle cx="450" cy="400" r="10" fill="white" opacity="0.1"/>
</svg>
