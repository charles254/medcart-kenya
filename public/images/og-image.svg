<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Cross icon -->
  <rect x="540" y="120" width="120" height="40" rx="8" fill="white" opacity="0.9" />
  <rect x="580" y="80" width="40" height="120" rx="8" fill="white" opacity="0.9" />
  <!-- Brand name -->
  <text x="600" y="300" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="700" fill="white" text-anchor="middle">AfyaCart Kenya</text>
  <!-- Tagline -->
  <text x="600" y="370" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="400" fill="white" opacity="0.9" text-anchor="middle">Your Trusted Online Pharmacy</text>
  <!-- Subtext -->
  <text x="600" y="430" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="400" fill="white" opacity="0.7" text-anchor="middle">8,000+ Medicines | Fast Delivery Across Kenya</text>
  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="white" opacity="0.15" />
  <text x="600" y="618" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="white" opacity="0.8" text-anchor="middle">afyacart.co.ke</text>
</svg>
