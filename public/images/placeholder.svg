<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#FFFFFF" rx="8"/>
  <!-- Subtle pill icon -->
  <g transform="translate(100, 90)">
    <rect x="-30" y="-10" width="60" height="20" rx="10" fill="#E2E8F0"/>
    <rect x="0" y="-10" width="30" height="20" rx="0" fill="#CBD5E1" clip-path="inset(0 0 0 0 round 0 10px 10px 0)"/>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#FFFFFF" stroke-width="1.5"/>
  </g>
  <text x="100" y="130" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#CBD5E1">No Image</text>
</svg>
